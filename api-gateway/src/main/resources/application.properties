quarkus.application.name=api-gateway
quarkus.http.port=8080
quarkus.smallrye-health.root-path=/q/health

quarkus.http.cors=true
quarkus.http.cors.origins=${WEB_ORIGIN:http://localhost:4321}
quarkus.http.cors.methods=GET,POST,OPTIONS
quarkus.http.cors.headers=accept,authorization,content-type

mp.jwt.verify.publickey.location=${JWT_PUBLIC_KEY_LOCATION:file:/run/secrets/jwt-public.pem}
mp.jwt.verify.issuer=${JWT_ISSUER:bolao-user-service}
mp.jwt.verify.audiences=${JWT_AUDIENCE:bolao-api}
mp.jwt.verify.publickey.algorithm=RS256
%test.mp.jwt.verify.publickey.location=publicKey.pem
%test.quarkus.http.test-port=18080
%test.partidas-service.url=http://localhost:18081

user-service.url=${USER_SERVICE_URL:http://user-service:8082}
partidas-service.url=${PARTIDAS_SERVICE_URL:http://partidas-service:8081}
web-service.url=${WEB_SERVICE_URL:http://web:80}
