# Perfil A: aplicações containerizadas. Gere as chaves de desenvolvimento
# antes de subir (instruções no README): .secrets/jwt-private.pem e jwt-public.pem.

services:

  partidas-db:
    image: postgres:16-alpine
    container_name: bolao-partidas-db
    environment:
      POSTGRES_DB: partidas_db
      POSTGRES_USER: bolao
      POSTGRES_PASSWORD: bolao
    expose:
      - "5432"
    volumes:
      - partidas_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bolao -d partidas_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  partidas-cache:
    image: redis:7-alpine
    container_name: bolao-partidas-cache
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: bolao-kafka
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:29092'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LOG_DIRS: '/tmp/kraft-combined-logs'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5

  partidas-service:
    build:
      context: .
      dockerfile: partidas-service/Dockerfile
    container_name: bolao-partidas-service
    environment:
      PARTIDAS_DB_URL: jdbc:postgresql://partidas-db:5432/partidas_db
      PARTIDAS_DB_USER: bolao
      PARTIDAS_DB_PASSWORD: bolao
      REDIS_HOSTS: redis://partidas-cache:6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    expose:
      - "8081"
    depends_on:
      partidas-db:
        condition: service_healthy
      partidas-cache:
        condition: service_healthy
      kafka:
        condition: service_healthy

  carteira-db:
    image: postgres:16-alpine
    container_name: bolao-carteira-db
    environment:
      POSTGRES_DB: carteira_db
      POSTGRES_USER: bolao
      POSTGRES_PASSWORD: bolao
    ports:
      - "5434:5432"
    volumes:
      - carteira_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bolao -d carteira_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  carteira-cache:
    image: redis:7-alpine
    container_name: bolao-carteira-cache
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  carteira-service:
    build:
      context: ./carteira-service
      dockerfile: Dockerfile
    container_name: bolao-carteira-service
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://carteira-db:5432/carteira_db
      QUARKUS_DATASOURCE_USERNAME: bolao
      QUARKUS_DATASOURCE_PASSWORD: bolao
      QUARKUS_REDIS_HOSTS: redis://carteira-cache:6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    expose:
      - "8080"
    depends_on:
      carteira-db:
        condition: service_healthy
      carteira-cache:
        condition: service_healthy
      kafka:
        condition: service_healthy

  user-db:
    image: postgres:16-alpine
    container_name: bolao-user-db
    environment:
      POSTGRES_DB: user_db
      POSTGRES_USER: bolao
      POSTGRES_PASSWORD: bolao
    volumes:
      - user_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bolao -d user_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    container_name: bolao-user-service
    environment:
      USER_DB_URL: jdbc:postgresql://user-db:5432/user_db
      USER_DB_USER: bolao
      USER_DB_PASSWORD: bolao
      JWT_ISSUER: bolao-user-service
      JWT_AUDIENCE: bolao-api
      JWT_EXPIRATION_SECONDS: 3600
      JWT_PRIVATE_KEY_LOCATION: file:/run/secrets/jwt-private.pem
    expose:
      - "8082"
    volumes:
      - ./.secrets/jwt-private.pem:/run/secrets/jwt-private.pem:ro
    depends_on:
      user-db:
        condition: service_healthy

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: bolao-api-gateway
    environment:
      USER_SERVICE_URL: http://user-service:8082
      PARTIDAS_SERVICE_URL: http://partidas-service:8081
      CARTEIRA_SERVICE_URL: http://carteira-service:8080
      WEB_SERVICE_URL: http://web:80
      JWT_ISSUER: bolao-user-service
      JWT_AUDIENCE: bolao-api
      JWT_PUBLIC_KEY_LOCATION: file:/run/secrets/jwt-public.pem
      WEB_ORIGIN: http://localhost:8080
    ports:
      - "8080:8080"
    volumes:
      - ./.secrets/jwt-public.pem:/run/secrets/jwt-public.pem:ro
    depends_on:
      partidas-service:
        condition: service_started
      carteira-service:
        condition: service_started
      user-service:
        condition: service_started

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        PUBLIC_API_BASE_URL: /api
    container_name: bolao-web
    expose:
      - "80"
    depends_on:
      api-gateway:
        condition: service_started

volumes:
  partidas_db_data:
  carteira_db_data:
  user_db_data:
