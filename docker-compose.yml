# Perfil A: aplicações containerizadas. Gere as chaves de desenvolvimento
# antes de subir (instruções no README): .secrets/jwt-private.pem e jwt-public.pem.

services:

  partidas-db:
    image: postgres:16-alpine
    container_name: bolao-partidas-db
    environment:
      POSTGRES_DB: partidas_db
      POSTGRES_USER: bolao
      POSTGRES_PASSWORD: bolao
    expose:
      - "5432"
    volumes:
      - partidas_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bolao -d partidas_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  partidas-cache:
    image: redis:7-alpine
    container_name: bolao-partidas-cache
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: bolao-kafka
    expose:
      - "9092"
      - "29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:29092'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LOG_DIRS: '/tmp/kraft-combined-logs'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5

  partidas-service:
    build:
      context: .
      dockerfile: partidas-service/Dockerfile
    container_name: bolao-partidas-service
    environment:
      PARTIDAS_DB_URL: jdbc:postgresql://partidas-db:5432/partidas_db
      PARTIDAS_DB_USER: bolao
      PARTIDAS_DB_PASSWORD: bolao
      REDIS_HOSTS: redis://partidas-cache:6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JWT_PUBLIC_KEY_LOCATION: file:/run/secrets/jwt-public.pem
      JWT_ISSUER: bolao-user-service
      JWT_AUDIENCE: bolao-api
    expose:
      - "8081"
    volumes:
      - ./.secrets/jwt-public.pem:/run/secrets/jwt-public.pem:ro
    depends_on:
      partidas-db:
        condition: service_healthy
      partidas-cache:
        condition: service_healthy
      kafka:
        condition: service_healthy

  carteira-db:
    image: postgres:16-alpine
    container_name: bolao-carteira-db
    environment:
      POSTGRES_DB: carteira_db
      POSTGRES_USER: bolao
      POSTGRES_PASSWORD: bolao
    expose:
      - "5432"
    volumes:
      - carteira_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bolao -d carteira_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  carteira-cache:
    image: redis:7-alpine
    container_name: bolao-carteira-cache
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  carteira-service:
    build:
      context: ./carteira-service
      dockerfile: Dockerfile
    container_name: bolao-carteira-service
    environment:
      QUARKUS_DATASOURCE_REACTIVE_URL: postgresql://carteira-db:5432/carteira_db
      QUARKUS_DATASOURCE_USERNAME: bolao
      QUARKUS_DATASOURCE_PASSWORD: bolao
      QUARKUS_REDIS_HOSTS: redis://carteira-cache:6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JWT_PUBLIC_KEY_LOCATION: file:/run/secrets/jwt-public.pem
      JWT_ISSUER: bolao-user-service
      JWT_AUDIENCE: bolao-api
      ADMIN_CREDIT_MAX_CENTS: 1000000
    expose:
      - "8080"
    volumes:
      - ./.secrets/jwt-public.pem:/run/secrets/jwt-public.pem:ro
    depends_on:
      carteira-db:
        condition: service_healthy
      carteira-cache:
        condition: service_healthy
      kafka:
        condition: service_healthy

  apostas-db:
    image: postgres:16-alpine
    container_name: bolao-apostas-db
    environment:
      POSTGRES_DB: apostas_db
      POSTGRES_USER: bolao
      POSTGRES_PASSWORD: bolao
    expose:
      - "5432"
    volumes:
      - apostas_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bolao -d apostas_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  apostas-service:
    build:
      context: ./apostas-service
      dockerfile: Dockerfile
    container_name: bolao-apostas-service
    environment:
      DATABASE_URL: postgresql+psycopg://bolao:bolao@apostas-db:5432/apostas_db
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_BET_TOPIC: bet-events
      KAFKA_MATCH_TOPIC: match-events
      KAFKA_WALLET_TOPIC: wallet-events
      JWT_PUBLIC_KEY_LOCATION: /run/secrets/jwt-public.pem
      JWT_ISSUER: bolao-user-service
      JWT_AUDIENCE: bolao-api
    expose:
      - "8000"
    volumes:
      - ./.secrets/jwt-public.pem:/run/secrets/jwt-public.pem:ro
    depends_on:
      apostas-db:
        condition: service_healthy
      kafka:
        condition: service_healthy

  user-db:
    image: postgres:16-alpine
    container_name: bolao-user-db
    environment:
      POSTGRES_DB: user_db
      POSTGRES_USER: bolao
      POSTGRES_PASSWORD: bolao
    expose:
      - "5432"
    volumes:
      - user_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bolao -d user_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    container_name: bolao-user-service
    environment:
      USER_DB_URL: jdbc:postgresql://user-db:5432/user_db
      USER_DB_USER: bolao
      USER_DB_PASSWORD: bolao
      JWT_ISSUER: bolao-user-service
      JWT_AUDIENCE: bolao-api
      JWT_EXPIRATION_SECONDS: 3600
      JWT_PRIVATE_KEY_LOCATION: file:/run/secrets/jwt-private.pem
      JWT_PUBLIC_KEY_LOCATION: file:/run/secrets/jwt-public.pem
      ADMIN_BOOTSTRAP_NAME: Administrador
      ADMIN_BOOTSTRAP_USERNAME: admin
      ADMIN_BOOTSTRAP_PASSWORD_FILE: /run/secrets/admin-password
    expose:
      - "8082"
    volumes:
      - ./.secrets/jwt-private.pem:/run/secrets/jwt-private.pem:ro
      - ./.secrets/jwt-public.pem:/run/secrets/jwt-public.pem:ro
      - ./.secrets/admin-password:/run/secrets/admin-password:ro
    depends_on:
      user-db:
        condition: service_healthy

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: bolao-api-gateway
    environment:
      USER_SERVICE_URL: http://user-service:8082
      PARTIDAS_SERVICE_URL: http://partidas-service:8081
      CARTEIRA_SERVICE_URL: http://carteira-service:8080
      APOSTAS_SERVICE_URL: http://apostas-service:8000
      WEB_SERVICE_URL: http://web:80
      JWT_ISSUER: bolao-user-service
      JWT_AUDIENCE: bolao-api
      JWT_PUBLIC_KEY_LOCATION: file:/run/secrets/jwt-public.pem
      WEB_ORIGIN: http://localhost:8080
    ports:
      - "8080:8080"
    volumes:
      - ./.secrets/jwt-public.pem:/run/secrets/jwt-public.pem:ro
    depends_on:
      partidas-service:
        condition: service_started
      carteira-service:
        condition: service_started
      apostas-service:
        condition: service_started
      user-service:
        condition: service_started

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        PUBLIC_API_BASE_URL: /api
    container_name: bolao-web
    expose:
      - "80"
    depends_on:
      api-gateway:
        condition: service_started

  pgadmin:
    profiles: ["tools"]
    image: dpage/pgadmin4:latest
    container_name: bolao-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@local.dev}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
    ports:
      - "127.0.0.1:5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      partidas-db:
        condition: service_healthy
      carteira-db:
        condition: service_healthy
      apostas-db:
        condition: service_healthy
      user-db:
        condition: service_healthy

  kafbat-ui:
    profiles: ["tools"]
    image: ghcr.io/kafbat/kafka-ui:v1.5.0
    container_name: bolao-kafbat-ui
    environment:
      KAFKA_CLUSTERS_0_NAME: bolao-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    ports:
      - "127.0.0.1:5051:8080"
    depends_on:
      kafka:
        condition: service_healthy

  partidas-test-db:
    profiles: ["test"]
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: partidas_test_db
      POSTGRES_USER: bolao
      POSTGRES_PASSWORD: bolao
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bolao -d partidas_test_db"]
      interval: 2s
      timeout: 3s
      retries: 10

  user-test-db:
    profiles: ["test"]
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: user_test_db
      POSTGRES_USER: bolao
      POSTGRES_PASSWORD: bolao
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bolao -d user_test_db"]
      interval: 2s
      timeout: 3s
      retries: 10

  partidas-test-cache:
    profiles: ["test"]
    image: redis:7-alpine
    tmpfs:
      - /data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 10

  backend-tests:
    profiles: ["test"]
    image: maven:3.9-eclipse-temurin-21
    working_dir: /workspace
    command: ["mvn", "-B", "test"]
    environment:
      QUARKUS_DATASOURCE_DEVSERVICES_ENABLED: "false"
      QUARKUS_KAFKA_DEVSERVICES_ENABLED: "false"
      PARTIDAS_TEST_DB_URL: jdbc:postgresql://partidas-test-db:5432/partidas_test_db
      USER_TEST_DB_URL: jdbc:postgresql://user-test-db:5432/user_test_db
      PARTIDAS_DB_USER: bolao
      PARTIDAS_DB_PASSWORD: bolao
      USER_DB_USER: bolao
      USER_DB_PASSWORD: bolao
      QUARKUS_REDIS_HOSTS: redis://partidas-test-cache:6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    volumes:
      - ./:/workspace
      - maven_test_cache:/root/.m2
    depends_on:
      partidas-test-db:
        condition: service_healthy
      partidas-test-cache:
        condition: service_healthy
      user-test-db:
        condition: service_healthy
      kafka:
        condition: service_healthy

  apostas-tests:
    profiles: ["test"]
    build:
      context: ./apostas-service
      dockerfile: Dockerfile
    working_dir: /app
    command: ["python", "-m", "unittest", "discover", "-s", "tests", "-v"]
    volumes:
      - ./apostas-service/tests:/app/tests:ro

  web-e2e:
    profiles: ["test"]
    image: mcr.microsoft.com/playwright:v1.61.1-noble
    working_dir: /workspace/web
    entrypoint: ["/bin/bash", "-lc"]
    command: ["corepack enable && corepack pnpm install --frozen-lockfile && corepack pnpm test:e2e:gateway"]
    environment:
      CI: "true"
      PLAYWRIGHT_BASE_URL: http://api-gateway:8080
    volumes:
      - ./:/workspace
      - pnpm_test_store:/root/.local/share/pnpm/store
    depends_on:
      api-gateway:
        condition: service_started

volumes:
  partidas_db_data:
  carteira_db_data:
  apostas_db_data:
  user_db_data:
  pgadmin_data:
  maven_test_cache:
  pnpm_test_store:
