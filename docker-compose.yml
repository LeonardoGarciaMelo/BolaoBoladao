# docker-compose para o Perfil A (tudo em Docker).
#
# Cada serviço do bolão tem sua base de dados própria e segregada
# (ver docs/arquitetura.md e ADR-001). Por enquanto só o partidas-service
# está implementado; os demais (apostas, usuarios, carteira) e o Kafka
# entram aqui à medida que o resto do grupo for entregando.
#
# Uso:
#   docker compose up --build partidas-db partidas-service
#   docker compose up -d partidas-db   # só o banco, pra rodar o serviço via IDE/mvn quarkus:dev

services:

  partidas-db:
    image: postgres:16-alpine
    container_name: bolao-partidas-db
    environment:
      POSTGRES_DB: partidas_db
      POSTGRES_USER: bolao
      POSTGRES_PASSWORD: bolao
    ports:
      - "5433:5432"
    volumes:
      - partidas_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bolao -d partidas_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  partidas-cache:
    image: redis:7-alpine
    container_name: bolao-partidas-cache
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: bolao-kafka
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:29092'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LOG_DIRS: '/tmp/kraft-combined-logs'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5

  partidas-service:
    build:
      context: .
      dockerfile: partidas-service/Dockerfile
    container_name: bolao-partidas-service
    environment:
      PARTIDAS_DB_URL: jdbc:postgresql://partidas-db:5432/partidas_db
      PARTIDAS_DB_USER: bolao
      PARTIDAS_DB_PASSWORD: bolao
      REDIS_HOSTS: redis://partidas-cache:6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8081:8081"
    depends_on:
      partidas-db:
        condition: service_healthy
      partidas-cache:
        condition: service_healthy
      kafka:
        condition: service_healthy

  carteira-db:
    image: postgres:16-alpine
    container_name: bolao-carteira-db
    environment:
      POSTGRES_DB: carteira_db
      POSTGRES_USER: bolao
      POSTGRES_PASSWORD: bolao
    ports:
      - "5434:5432"
    volumes:
      - carteira_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bolao -d carteira_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  carteira-cache:
    image: redis:7-alpine
    container_name: bolao-carteira-cache
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  carteira-service:
    build:
      context: .
      dockerfile: carteira-service/Dockerfile
    container_name: bolao-carteira-service
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://carteira-db:5432/carteira_db
      QUARKUS_DATASOURCE_USERNAME: bolao
      QUARKUS_DATASOURCE_PASSWORD: bolao
      QUARKUS_REDIS_HOSTS: redis://carteira-cache:6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8082:8080"
    depends_on:
      carteira-db:
        condition: service_healthy
      carteira-cache:
        condition: service_healthy
      kafka:
        condition: service_healthy

  # --- placeholders para os próximos serviços do grupo ---
  # apostas-db:
  #   image: postgres:16-alpine
  #   ...
  # usuarios-db:
  #   image: postgres:16-alpine
  #   ...

volumes:
  partidas_db_data:
  carteira_db_data:
