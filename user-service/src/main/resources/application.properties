quarkus.application.name=user-service
quarkus.http.port=8082

quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${USER_DB_USER:bolao}
quarkus.datasource.password=${USER_DB_PASSWORD:bolao}
%prod.quarkus.datasource.jdbc.url=${USER_DB_URL:jdbc:postgresql://localhost:5434/user_db}
%dev.quarkus.datasource.jdbc.url=${USER_DB_URL:jdbc:postgresql://localhost:5434/user_db}
%A.quarkus.datasource.jdbc.url=${USER_DB_URL:jdbc:postgresql://localhost:5434/user_db}
%B.quarkus.datasource.jdbc.url=${USER_DB_URL:jdbc:postgresql://localhost:5434/user_db}
quarkus.hibernate-orm.database.generation=validate
quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true
quarkus.smallrye-health.root-path=/q/health

jwt.issuer=${JWT_ISSUER:bolao-user-service}
jwt.audience=${JWT_AUDIENCE:bolao-api}
jwt.expiration-seconds=${JWT_EXPIRATION_SECONDS:3600}
jwt.private-key-location=${JWT_PRIVATE_KEY_LOCATION:file:/run/secrets/jwt-private.pem}
mp.jwt.verify.publickey.location=${JWT_PUBLIC_KEY_LOCATION:file:/run/secrets/jwt-public.pem}
mp.jwt.verify.issuer=${JWT_ISSUER:bolao-user-service}
mp.jwt.verify.audiences=${JWT_AUDIENCE:bolao-api}

admin.bootstrap.name=${ADMIN_BOOTSTRAP_NAME:}
admin.bootstrap.username=${ADMIN_BOOTSTRAP_USERNAME:}
admin.bootstrap.password=${ADMIN_BOOTSTRAP_PASSWORD:}
admin.bootstrap.password-file=${ADMIN_BOOTSTRAP_PASSWORD_FILE:}

%test.jwt.private-key-location=privateKey.pem
%test.mp.jwt.verify.publickey.location=publicKey.pem
%test.admin.bootstrap.name=Administrador Teste
%test.admin.bootstrap.username=admin
%test.admin.bootstrap.password=admin-seguro-123
%test.admin.bootstrap.password-file=
%test.quarkus.datasource.devservices.enabled=true
%test.quarkus.datasource.jdbc.url=${USER_TEST_DB_URL:}
%test.quarkus.http.test-port=0
