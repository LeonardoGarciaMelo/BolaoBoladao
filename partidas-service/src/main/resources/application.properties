quarkus.application.name=partidas-service

# --- Datasource (PostgreSQL) ---
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${PARTIDAS_DB_USER:bolao}
quarkus.datasource.password=${PARTIDAS_DB_PASSWORD:bolao}
%prod.quarkus.datasource.jdbc.url=${PARTIDAS_DB_URL:jdbc:postgresql://localhost:5433/partidas_db}
%dev.quarkus.datasource.jdbc.url=${PARTIDAS_DB_URL:jdbc:postgresql://localhost:5433/partidas_db}
%A.quarkus.datasource.jdbc.url=${PARTIDAS_DB_URL:jdbc:postgresql://localhost:5433/partidas_db}
%B.quarkus.datasource.jdbc.url=${PARTIDAS_DB_URL:jdbc:postgresql://localhost:5433/partidas_db}

# Schema é gerenciado por Flyway; Hibernate só valida.
quarkus.hibernate-orm.database.generation=validate
quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true

# --- HTTP ---
quarkus.http.port=8081

# --- Health ---
quarkus.smallrye-health.root-path=/q/health

mp.jwt.verify.publickey.location=${JWT_PUBLIC_KEY_LOCATION:file:/run/secrets/jwt-public.pem}
mp.jwt.verify.issuer=${JWT_ISSUER:bolao-user-service}
mp.jwt.verify.audiences=${JWT_AUDIENCE:bolao-api}

# ==========================================================
# Perfil A: tudo em Docker. DevServices desligados porque o
# Postgres já sobe via docker-compose (ver docker-compose.yml
# na raiz do monorepo) - evita subir dois bancos concorrentes.
# ==========================================================
%A.quarkus.datasource.devservices.enabled=false

# ==========================================================
# Perfil B: restrito/JVM, sem Docker. Aponta para um Postgres
# já provisionado externamente (ex.: instância local instalada
# manualmente, ou banco compartilhado da equipe).
# ==========================================================
%B.quarkus.datasource.devservices.enabled=false
%B.quarkus.flyway.migrate-at-start=true

# ==========================================================
# Perfil C: conceitual. Sem execução real de banco - usado só
# para compilar e rodar testes puramente unitários (sem @QuarkusTest
# que suba contexto/Testcontainers).
# ==========================================================
%C.quarkus.datasource.devservices.enabled=false

# --- Teste (perfil de testes do Maven, usa Testcontainers) ---
%test.quarkus.datasource.devservices.enabled=true
%test.quarkus.datasource.jdbc.url=${PARTIDAS_TEST_DB_URL:}
%test.quarkus.flyway.migrate-at-start=true
%test.quarkus.http.test-port=0
%test.quarkus.kafka.devservices.image-name=redpandadata/redpanda:v24.1.2
%test.mp.jwt.verify.publickey.location=publicKey.pem

# --- Redis Configuration ---
%prod.quarkus.redis.hosts=${REDIS_HOSTS:redis://localhost:6379}
%dev.quarkus.redis.hosts=${REDIS_HOSTS:redis://localhost:6379}

# --- Kafka Configuration ---
mp.messaging.outgoing.match-events.connector=smallrye-kafka
mp.messaging.outgoing.match-events.topic=match-events
mp.messaging.outgoing.match-events.key.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.outgoing.match-events.value.serializer=io.quarkus.kafka.client.serialization.ObjectMapperSerializer

%prod.kafka.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
%dev.kafka.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
